    - img "Patient in hospital corridor" [ref=e303]
    - generic [ref=e304]:
      - generic [ref=e305]: Symptoms
      - heading "If you have any of these symptoms, visit a doctor." [level=2] [ref=e307]
      - paragraph [ref=e308]: Diabetes can develop gradually and its early warning signs are often easy to dismiss. Recognising them early gives you the best chance of managing the condition effectively and avoiding serious complications.
      - list [ref=e309]:
        - listitem [ref=e310]: Excessive thirst and frequent urination
        - listitem [ref=e312]: Unexplained weight loss or gain
        - listitem [ref=e314]: Blurred vision and persistent fatigue
        - listitem [ref=e316]: Slow-healing wounds or frequent infections
        - listitem [ref=e318]: Tingling or numbness in hands and feet
      - link "Learn more about symptoms" [ref=e320] [cursor=pointer]:
        - /url: "#"
        - text: Learn more about symptoms
        - img [ref=e321]
