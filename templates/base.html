<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Playfair Display"', '"Times New Roman"', 'Georgia', 'serif'],
            ui: ['"Open Sans"', 'Arial', 'sans-serif', 'serif'],
          },
          colors: {
            canvas:   '#FAFCFF',
            surface:  '#F0F8FF',
            raised:   '#E8F4FF',
            overlay:  'rgba(255, 255, 255, 0.8)',
            border:   '#C5DFF0',
            'border-soft': '#DAEEFF',
            accent:   '#1D5FAD',
            'accent-bright': '#0F3D7A',
            'accent-glow': 'rgba(29, 95, 173, 0.12)',
            ink:      '#0D0F10',
            'ink-dim': '#33383D',
            'ink-muted': '#595E63',
            success:  '#34d399',
            warning:  '#fbbf24',
          },
          borderRadius: {
            card: '16px',
          },
          boxShadow: {
            card: '0 1px 2px rgba(0,0,0,0.3), 0 4px 12px rgba(0,0,0,0.15)',
            glow: '0 0 30px rgba(59, 130, 246, 0.064)',
            'glow-lg': '0 0 60px rgba(59, 130, 246, 0.096)',
          },
          animation: {
            'fade-up': 'fadeUp 0.7s ease-out forwards',
            'fade-in': 'fadeIn 0.6s ease-out forwards',
            'scale-in': 'scaleIn 0.5s ease-out forwards',
            'slide-right': 'slideRight 0.6s ease-out forwards',
            'slide-left': 'slideLeft 0.6s ease-out forwards',
            'pulse-glow': 'pulseGlow 3s ease-in-out infinite',
          },
          keyframes: {
            fadeUp: {
              '0%': { opacity: '0', transform: 'translateY(28.8px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            scaleIn: {
              '0%': { opacity: '0', transform: 'scale(0.95)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            },
            slideRight: {
              '0%': { opacity: '0', transform: 'translateX(-24px)' },
              '100%': { opacity: '1', transform: 'translateX(0)' },
            },
            slideLeft: {
              '0%': { opacity: '0', transform: 'translateX(24px)' },
              '100%': { opacity: '1', transform: 'translateX(0)' },
            },
            pulseGlow: {
              '0%, 100%': { boxShadow: '0 0 20px rgba(59, 130, 246, 0.04)' },
              '50%': { boxShadow: '0 0 40px rgba(59, 130, 246, 0.12)' },
            },
          },
        },
      },
    }
  </script>
  <link rel="stylesheet" href="/static/css/styles.css?v=waffle-chart-2" />
  {% block head %}{% endblock %}
</head>
<body class="bg-canvas text-ink font-ui font-light text-[18px] md:text-[20px] leading-[25.2px] md:leading-[28px] tracking-tight antialiased">

  {% block body %}{% endblock %}

  <div class="scroll-progress" aria-hidden="true">
    <div class="scroll-progress__bar"></div>
  </div>

  <script src="/static/js/main.js?v=scroll-progress-1"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
